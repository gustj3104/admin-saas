services:
  - type: web
    name: admin-saas-server
    env: docker
    plan: free
    rootDir: .
    dockerfilePath: ./server/Dockerfile
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: OCR_COMMAND
        value: tesseract

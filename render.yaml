services:
  - type: web
    name: admin-saas-server
    runtime: java
    rootDir: server
    plan: free
    buildCommand: ./gradlew bootJar
    startCommand: java -jar build/libs/admin-saas-server-0.0.1-SNAPSHOT.jar
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: OCR_COMMAND
        value: tesseract

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/admin_saas}
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:admin1234}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

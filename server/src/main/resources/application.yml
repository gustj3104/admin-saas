spring:
  application:
    name: admin-saas-server
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  servlet:
    multipart:
      max-file-size: ${MULTIPART_MAX_FILE_SIZE:20MB}
      max-request-size: ${MULTIPART_MAX_REQUEST_SIZE:25MB}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

app:
  storage:
    upload-dir: ${UPLOAD_DIR:uploads}
  ocr:
    command: ${OCR_COMMAND:tesseract}
    language: ${OCR_LANGUAGE:kor+eng}
    timeout-seconds: ${OCR_TIMEOUT_SECONDS:20}
  hwp:
    converter:
      command: ${HWP_CONVERTER_COMMAND:scripts\\convert-to-hwp.bat "{docx}" "{output}" "{hml}"}
      timeout-seconds: ${HWP_CONVERTER_TIMEOUT_SECONDS:60}
